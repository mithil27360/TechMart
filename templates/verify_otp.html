{% extends "base.html" %}
{% block title %}Verify Your Account{% endblock %}

{% block content %}
<div class="otp-page">
  <div class="auth-card">
    <h1 class="auth-title">Verify Email</h1>
    <p class="otp-subtitle">We've sent a 6-digit verification code to your email. Please enter it below to activate your account.</p>

    <form method="POST" action="{{ url_for('verify_otp') }}">
      <div class="otp-inputs">
        <input type="text" name="otp" maxlength="6" class="otp-field" placeholder="000000" autocomplete="one-time-code" autofocus required>
      </div>
      <button type="submit" class="btn-submit">Verify Account</button>
    </form>

    <a href="#" class="resend-link" onclick="location.reload();">Didn't receive a code? Resend</a>
    
    <p class="auth-switch" style="margin-top: 32px;"><a href="{{ url_for('logout') }}">Sign in as a different user</a></p>
  </div>
</div>
{% endblock %}
