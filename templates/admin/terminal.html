{% extends "base.html" %}
{% block title %}SQL Terminal{% endblock %}

{% block content %}
<div class="inner-page" style="max-width:1100px; padding-top: 32px;">
    <div style="margin-bottom: 24px;">
        <p class="page-eyebrow" style="color: var(--grey-400); margin-bottom: 4px;">System Console</p>
        <h1 class="page-title" style="font-size: 1.8rem; letter-spacing: -0.03em;">SQL Terminal</h1>
    </div>

    <div class="terminal-container">
        <!-- Terminal Dots for Minimal Header -->
        <div class="terminal-dots-header">
            <span class="d s red"></span>
            <span class="d s yellow"></span>
            <span class="d s green"></span>
            <span class="term-t">mysql@marketnest: ~</span>
        </div>

        <div class="terminal-body" id="terminalOutput">
            <!-- Lines will be appended here -->
        </div>

        <div class="terminal-input-area">
            <div class="terminal-input-row" id="inputRow">
                <span class="prompt">system@techmart:~$</span>
                <div class="input-wrapper">
                    <input type="text" id="sqlInput" autofocus placeholder="SELECT * FROM items LIMIT 5;" autocomplete="off">
                    <span class="cursor"></span>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
/* Reset & Typography */
.terminal-container {
    background: #0d1117;
    border-radius: 10px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    border: 1px solid #30363d;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    display: flex;
    flex-direction: column;
    height: 520px;
    position: relative;
    overflow: hidden;
}

.terminal-dots-header {
    background: #161b22;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid #30363d;
    gap: 8px;
}
.d { width: 10px; height: 10px; border-radius: 50%; }
.red { background: #ff5f56; }
.yellow { background: #ffbd2e; }
.green { background: #27c93f; }
.term-t { margin-left: auto; margin-right: auto; font-size: 0.72rem; color: #8b949e; opacity: 0.8; }

.terminal-body {
    flex-grow: 1;
    padding: 16px 20px;
    overflow-y: auto;
    color: #c9d1d9;
    font-size: 0.82rem;
    line-height: 1.35;
}

.terminal-line { margin-bottom: 2px; display: flex; gap: 8px; align-items: flex-start; }
.timestamp { color: #484f58; min-width: 65px; user-select: none; font-size: 0.75rem; }
.prompt { color: #7ee787; font-weight: 600; white-space: nowrap; }
.terminal-content { flex: 1; word-break: break-all; }

.msg { color: #8b949e; }
.error-msg { color: #ff7b72; }
.success-msg { color: #7ee787; }
.cmd-text { color: #f0f6fc; font-weight: 500; }

.terminal-input-area { background: #0d1117; padding: 10px 20px; border-top: 1px solid #21262d; }
.terminal-input-row { display: flex; align-items: center; gap: 8px; }
.input-wrapper { position: relative; flex: 1; display: flex; align-items: center; }

#sqlInput {
    background: transparent !important;
    border: none !important;
    color: #f0f6fc;
    width: 100%;
    font-family: inherit;
    font-size: 0.82rem;
    outline: none !important;
    padding: 0;
    box-shadow: none !important;
    appearance: none;
    -webkit-appearance: none;
}
#sqlInput::placeholder { color: #484f58; opacity: 0.6; }

/* Remove Autofill Blue Background */
#sqlInput:-webkit-autofill,
#sqlInput:-webkit-autofill:hover,
#sqlInput:-webkit-autofill:focus {
    -webkit-text-fill-color: #f0f6fc;
    -webkit-box-shadow: 0 0 0px 1000px #0d1117 inset;
    transition: background-color 5000s ease-in-out 0s;
}

.cursor {
    display: inline-block; width: 7px; height: 14px; background: #7ee787;
    margin-left: 1px; animation: blink 1s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

.term-table-wrapper { margin: 10px 0; border: 1px solid #30363d; border-radius: 4px; overflow: hidden; max-width: 100%; }
.term-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; text-align: left; }
.term-table th { background: #161b22; color: #8b949e; padding: 6px 10px; border-bottom: 1px solid #30363d; font-weight: 600; }
.term-table td { padding: 4px 10px; border-bottom: 1px solid #21262d; color: #c9d1d9; border-right: 1px solid #21262d; }
.term-table td:last-child { border-right: none; }
.term-table tr:hover { background: rgba(255,255,255,0.02); }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const output = document.getElementById('terminalOutput');
    const input = document.getElementById('sqlInput');

    function getTimestamp() {
        const now = new Date();
        return `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;
    }

    function appendLine(content, type = 'msg', isPrompt = false, typewriter = false) {
        const line = document.createElement('div');
        line.className = 'terminal-line';
        
        const ts = document.createElement('span');
        ts.className = 'timestamp';
        ts.textContent = getTimestamp();
        line.appendChild(ts);

        const promptSpan = document.createElement('span');
        promptSpan.className = 'prompt';
        promptSpan.textContent = isPrompt ? 'mysql>' : 'system@techmart:~$';
        line.appendChild(promptSpan);

        const contentSpan = document.createElement('span');
        contentSpan.className = 'terminal-content ' + (
            type === 'cmd' ? 'cmd-text' : 
            (type === 'error' ? 'error-msg' : 
            (type === 'success' ? 'success-msg' : 'msg'))
        );
        
        line.appendChild(contentSpan);
        output.appendChild(line);
        output.scrollTop = output.scrollHeight;

        if (typewriter) {
            let i = 0;
            const speed = 15;
            function type() {
                if (i < content.length) {
                    contentSpan.textContent += content.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        } else {
            contentSpan.textContent = content;
        }
    }

    function renderTable(columns, results) {
        if (!results || results.length === 0) {
            appendLine('Empty set (0 records).', 'msg');
            return;
        }

        const wrapper = document.createElement('div');
        wrapper.className = 'term-table-wrapper';
        const table = document.createElement('table');
        table.className = 'term-table';
        
        const thead = document.createElement('thead');
        const hRow = document.createElement('tr');
        columns.forEach(col => { const th = document.createElement('th'); th.textContent = col; hRow.appendChild(th); });
        thead.appendChild(hRow);
        table.appendChild(thead);
        
        const tbody = document.createElement('tbody');
        results.forEach(row => {
            const rRow = document.createElement('tr');
            columns.forEach(col => {
                const tr = document.createElement('td');
                let val = row[col];
                tr.textContent = val === null ? 'NULL' : (typeof val === 'object' ? JSON.stringify(val) : val);
                rRow.appendChild(tr);
            });
            tbody.appendChild(rRow);
        });
        table.appendChild(tbody);
        wrapper.appendChild(table);
        output.appendChild(wrapper);
        output.scrollTop = output.scrollHeight;
    }

    // Initial Welcome
    setTimeout(() => {
        appendLine('Connected to TechMart Admin Terminal. Type your SQL command below.', 'msg', false, true);
    }, 400);

    input.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            const sql = input.value.trim();
            if (!sql) return;

            appendLine(sql, 'cmd', true);
            input.value = '';
            input.disabled = true;
            
            // Artificial delay for realism
            const start = performance.now();
            const delay = Math.floor(Math.random() * 500) + 300; 

            setTimeout(async () => {
                try {
                    const response = await fetch('/admin/terminal', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sql })
                    });
                    
                    const data = await response.json();
                    const end = performance.now();
                    const execTime = ((end - start) / 1000).toFixed(3);

                    if (data.success) {
                        if (data.type === 'select') {
                            renderTable(data.columns, data.results);
                            appendLine(`Query OK • ${data.results.length} rows returned (${execTime} sec)`, 'success');
                        } else {
                            appendLine(`Query OK • ${data.affected_rows} rows affected (${execTime} sec)`, 'success');
                        }
                    } else {
                        // Realistic Error Formatting
                        const errMatch = data.error.match(/\((\d+), "(.*)"\)/) || [null, '1064', data.error];
                        const errCode = errMatch[1] || '1064';
                        const errMsg = (errMatch[2] || data.error).replace("'", "''");
                        appendLine(`ERROR ${errCode} (42000): ${errMsg}`, 'error');
                    }
                } catch (err) {
                    appendLine(`Connection interrupted: ${err.message}`, 'error');
                } finally {
                    input.disabled = false;
                    input.focus();
                }
            }, delay);
        }
    });

    document.querySelector('.terminal-container').addEventListener('click', () => input.focus());
});
</script>
{% endblock %}
