{% extends "base.html" %}
{% block title %}Post Item{% endblock %}

{% block content %}
<div class="inner-page">
  <p class="page-eyebrow">Seller</p>
  <h1 class="page-title">Post a New Item</h1>
  <p class="page-sub">Describe your product and reach matching buyers instantly via automated alerts.</p>

  <div class="card-box">
    <form method="POST" action="{{ url_for('post_item') }}" enctype="multipart/form-data">
      <div class="form-row">
        <div class="form-group">
          <label for="title">Product Title</label>
          <input type="text" id="title" name="title" required placeholder="e.g. iPhone 13 Pro">
        </div>
        <div class="form-group">
          <label for="price">Price (₹)</label>
          <input type="number" id="price" name="price" required min="1" step="0.01" placeholder="Enter amount">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="condition">Item Condition</label>
          <select id="condition" name="condition" required>
            <option value="new">🆕 New</option>
            <option value="used" selected>🤝 Used</option>
            <option value="refurbished">🔧 Refurbished</option>
          </select>
        </div>
        <div class="form-group">
          <label for="quantity">Quantity in Stock</label>
          <input type="number" id="quantity" name="quantity" value="1" min="1" required>
        </div>
      </div>
      <div class="form-group">
        <label for="category_id">Category</label>
        <select id="category_id" name="category_id" required>
          <option value="">Select category</option>
          {% for cat_id, cat_info in categories.items() %}
            <optgroup label="{{ cat_info.name }}">
              {% for child in cat_info.children %}
                <option value="{{ child.category_id }}">{{ child.name }}</option>
              {% endfor %}
            </optgroup>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" required placeholder="Condition, age, key specs…"></textarea>
      </div>

      <!-- Image Upload Section -->
      <div class="form-group">
        <label>Product Photos <span style="font-weight:400; color:#6e6e73;">(up to 5 images, optional)</span></label>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="images" name="images" accept="image/*" multiple style="display:none;">
          <div class="upload-prompt" id="uploadPrompt">
            <div class="upload-icon">📷</div>
            <p>Drag & drop photos here or <span class="upload-link" onclick="document.getElementById('images').click()">browse</span></p>
            <p class="upload-hint">JPG, PNG, WebP — max 5 MB each</p>
          </div>
          <div class="img-preview-grid" id="previewGrid"></div>
        </div>
      </div>

      <button type="submit" class="submit-btn">List Item</button>
    </form>
  </div>

</div>

<script>
const input = document.getElementById('images');
const zone  = document.getElementById('uploadZone');
const grid  = document.getElementById('previewGrid');
const prompt = document.getElementById('uploadPrompt');

function showPreviews(files) {
  grid.innerHTML = '';
  const arr = Array.from(files).slice(0, 5);
  if (arr.length > 0) prompt.style.display = 'none';
  arr.forEach((file, idx) => {
    const reader = new FileReader();
    reader.onload = e => {
      const wrap = document.createElement('div');
      wrap.className = 'preview-thumb';
      wrap.innerHTML = `
        <img src="${e.target.result}" alt="preview">
        ${idx === 0 ? '<span class="primary-badge">Primary</span>' : ''}
      `;
      grid.appendChild(wrap);
    };
    reader.readAsDataURL(file);
  });
}

input.addEventListener('change', () => showPreviews(input.files));

zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('drag-over');
  input.files = e.dataTransfer.files;
  showPreviews(e.dataTransfer.files);
});
</script>
{% endblock %}
