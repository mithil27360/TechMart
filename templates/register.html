{% extends "base.html" %}
{% block title %}Create Account{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card-logo" style="text-align: center; margin-bottom: 24px;">
      <a href="/" class="nav-logo" style="justify-content: center;">
        <span class="logo-text">Tech</span><span class="logo-highlight">Mart</span>
      </a>
    </div>
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-sub">Join the TechMart community.</p>

    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required placeholder="Your full name">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="name@email.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" name="password" required placeholder="Choose a password">
          <button type="button" class="pw-toggle" id="togglePassword"></button>
        </div>
      </div>
      <div class="form-group">
        <label>I am a</label>
        <div class="role-row" style="display: flex; gap: 12px; margin-top: 8px;">
          <label class="role-opt" style="flex: 1; position: relative;">
            <input type="radio" name="role" value="buyer" checked style="position: absolute; opacity: 0; pointer-events: none;">
            <div class="role-card" style="padding: 12px; border: 1px solid var(--grey-200); border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.2s var(--ease);">
              <span style="font-size: 1.5rem; display: block; margin-bottom: 4px;">🛒</span>
              <span style="font-size: 0.8rem; font-weight: 600;">Buyer</span>
            </div>
          </label>
          <label class="role-opt" style="flex: 1; position: relative;">
            <input type="radio" name="role" value="seller" style="position: absolute; opacity: 0; pointer-events: none;">
            <div class="role-card" style="padding: 12px; border: 1px solid var(--grey-200); border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.2s var(--ease);">
              <span style="font-size: 1.5rem; display: block; margin-bottom: 4px;">🏪</span>
              <span style="font-size: 0.8rem; font-weight: 600;">Seller</span>
            </div>
          </label>
        </div>
      </div>
      <button type="submit" class="btn-submit">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
  </div>
</div>
{% endblock %}
