{% extends "base.html" %}
{% block title %}Sign In{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Sign In</h1>
    <p class="auth-sub">Welcome back to MarketNest.</p>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="name@email.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" name="password" required placeholder="Your password">
          <button type="button" class="pw-toggle" id="togglePassword"></button>
        </div>
      </div>
      <button type="submit" class="btn-submit">Sign In</button>
    </form>

    <div class="auth-divider">
      <span>OR</span>
    </div>

    <a href="{{ url_for('login_google') }}" class="google-btn">
      <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
      Sign in with Google
    </a>

    <p class="auth-switch">New here? <a href="{{ url_for('register') }}">Create Account</a></p>
  </div>
</div>
{% endblock %}
